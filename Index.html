<!DOCTYPE html>
<html>
<head>
    	<meta charset="utf-8">
		<title>CATALOGO IMPORTADORA Y EXPORTADORA PEREZ</title>
		<link rel="stylesheet" href="https://wesjapan2021.github.io/WES_JAPAN_CATALOGO_COMPLETO/style.css">
		<link rel="license" href="https://www.opensource.org/licenses/mit-license/">
	</head>

<body>

<div class="titulo">CATÁLOGO DE PRODUCTOS WES JAPAN</div>

<table class="inventory">
    <thead>
        <tr>
            <th>CODIGO</th>
            <th>DESCRIPCION</th>
            <th>PRECIO</th>
            <th>EXISTENCIAS</th>
            <th>IMAGEN</th>
        </tr>
    </thead>

    <tbody>
        &lt;&lt;Start: ORDERBY(FILTER("PRODUCTOS", [EXISTENCIAS] &gt; 0), [DESCRIPCION])&gt;&gt;
        <tr>
            <td>&lt;&lt;[CODIGO]&gt;&gt;</td>
            <td>&lt;&lt;[DESCRIPCION]&gt;&gt;</td>
            <td class="precio">Q &lt;&lt;TEXT([PRECIO], "#,##0.00")&gt;&gt;</td>
            <td class="existencia">&lt;&lt;[EXISTENCIAS]&gt;&gt;</td>
            <td>
                <img src="&lt;&lt;[IMAGEN]&gt;&gt;" />
            </td>
        </tr>
        &lt;&lt;End&gt;&gt;
    </tbody>
</table>

</body>
</html>
