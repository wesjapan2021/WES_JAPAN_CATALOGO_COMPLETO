<!DOCTYPE html>
<html>
<head>
    	<meta charset="utf-8">
		<title>CATALOGO IMPORTADORA Y EXPORTADORA PEREZ</title>
		<link rel="stylesheet" href="https://wesjapan2021.github.io/WES_JAPAN_CATALOGO_COMPLETO/style.css">
		<link rel="license" href="https://www.opensource.org/licenses/mit-license/">
	</head>
<body>
<div class="titulo">CATÁLOGO DE PRODUCTOS WES JAPAN</div>
<table class="inventory">
    <thead>
        <tr>
            <th>CODIGO</th>
            <th>DESCRIPCION</th>
            <th>PRECIO</th>
            <th>EXISTENCIAS</th>
            <th>IMAGEN</th>
        </tr>
    </thead>
<p> &lt;&lt;START: FILTER("Existencias HOY Sin Ofertas Sin Fajas")&gt;&gt;
    <tbody>        
        <tr>
            <td>&lt;&lt;[CODIGO]&gt;&gt;</td>
            <td>&lt;&lt;[DESCRIPCION CATALOGO WES]&gt;&gt;</td>
            <td class="precio">Q &lt;&lt;[PRECIO]&gt;&gt;</td>
            <td class="existencia">&lt;&lt;[STOCK]&gt;&gt;</td>
            <td>
                <img src="&lt;&lt;[IMAGEN]&gt;&gt;"/>
            </td>
        </tr>
        &lt;&lt;END&gt;&gt; </p>
    </tbody>
</table>
</body>
</html>
